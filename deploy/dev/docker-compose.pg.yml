services:
  postgres:
    image: postgres:16
    container_name: pix2pi_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: pix2pi
      POSTGRES_USER: pix2pi
      POSTGRES_PASSWORD: pix2pi
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pix2pi_pg_data:/var/lib/postgresql/data
volumes:
  pix2pi_pg_data:
