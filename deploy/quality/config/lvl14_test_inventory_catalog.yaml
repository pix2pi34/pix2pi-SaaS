version: v1
test_inventory:
  layers:
    - id: unit
      required_fields:
        - module_name
        - owner
        - coverage_percent
        - status

    - id: integration
      required_fields:
        - integration_name
        - owner
        - coverage_percent
        - status

    - id: e2e
      required_fields:
        - scenario_name
        - owner
        - coverage_percent
        - status

  quality_ownership:
    required_fields:
      - module_name
      - owner_team
      - owner_role
      - assigned_at

  missing_test_classes:
    required_fields:
      - module_name
      - missing_class
      - severity
      - tracked_at

  baseline_quality:
    required_fields:
      - baseline_mode
      - summary_status
      - measured_at
