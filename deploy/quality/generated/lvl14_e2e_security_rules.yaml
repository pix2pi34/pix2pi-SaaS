version: v1
e2e_rules:
  auth_tenant_scenario_enabled: true
  dashboard_monitoring_scenario_enabled: true
  erp_accounting_scenario_enabled: true
  ebelge_export_scenario_enabled: true
  payment_reconciliation_scenario_enabled: true
