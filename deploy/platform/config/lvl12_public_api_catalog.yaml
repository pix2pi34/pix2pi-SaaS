version: v1
public_api:
  gateway_contract:
    required_fields:
      - route_id
      - method
      - path
      - version
      - auth_mode

  api_key_auth:
    required_fields:
      - api_key_id
      - app_id
      - issued_at
      - expires_at

  rate_limit_quota:
    required_fields:
      - per_minute_limit
      - daily_quota
      - burst_limit

  developer_docs:
    required_fields:
      - docs_version
      - docs_format
      - examples_enabled

  sandbox_mode:
    required_fields:
      - sandbox_enabled
      - sandbox_base_url
      - fixture_mode
