version: v1
jobs:
  engine:
    required_fields:
      - job_id
      - queue
      - handler
      - payload
      - created_at

  retryable_jobs:
    required_fields:
      - retry_count
      - max_retry
      - backoff_seconds
      - next_retry_at

  idempotent_jobs:
    required_fields:
      - idempotency_key
      - idempotency_ttl_seconds

  tenant_aware_jobs:
    required_fields:
      - tenant_id
      - tenant_scope
      - actor_id

  audit_trail:
    required_fields:
      - event_type
      - status
      - message
      - recorded_at
