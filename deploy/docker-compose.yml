version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pix2pi_db
    environment:
      POSTGRES_USER: tellioglu
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pix2pi_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
