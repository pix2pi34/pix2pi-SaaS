limit_req_zone $binary_remote_addr zone=pix2pi_edge:20m rate=20r/s;

upstream pix2pi_api_upstream {
    server 127.0.0.1:9010;
    keepalive 64;
}

upstream pix2pi_panel_upstream {
    server 127.0.0.1:7100;
    keepalive 32;
}

upstream pix2pi_auth_upstream {
    server 127.0.0.1:9001;
    keepalive 32;
}

upstream pix2pi_pos_upstream {
    server 127.0.0.1:7200;
    keepalive 32;
}

server {
    listen 80;
    server_name api.pix2pi.com.tr panel.pix2pi.com.tr auth.pix2pi.com.tr pos.pix2pi.com.tr;

    include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_logging.conf;

    location ^~ /.well-known/acme-challenge/ {
        include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_certbot_acme.conf;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.pix2pi.com.tr;

    ssl_certificate     /etc/letsencrypt/live/api.pix2pi.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pix2pi.com.tr/privkey.pem;

    include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_tls_policy.conf;
    include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_request_limits.conf;
    include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_logging.conf;
    include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_error_handling.conf;
    include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/generated/pix2pi_cdn_foundation.conf;
    include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_waf_foundation.conf;

    location /internal/ {
        deny all;
        return 403;
    }

    location = /health {
        allow 127.0.0.1/32;
        deny all;
        include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_proxy_common.conf;
        proxy_pass http://pix2pi_api_upstream/health;
    }

    location / {
        limit_req zone=pix2pi_edge burst=40 nodelay;
        include /root/pix2pi/pix2pi-SaaS/deploy/edge/nginx/includes/pix2pi_proxy_common.conf;
        proxy_pass http://pix2pi_api_upstream;
    }
}

server {
    listen 443 ssl http2;
    server_name panel.pix2pi.com.tr;

    ssl_certificate     /etc/letsencrypt/live/panel.pix2pi.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.pix2pi.com.tr/privkey.pem;

