<!doctype html>
<html lang="tr-TR" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="description" content="Pix2pi forbidden screen" />
  <meta property="og:title" content="Pix2pi Forbidden" />
  <meta property="og:description" content="Yetki gerektiren panel erişim ekranı." />
  <meta property="og:type" content="website" />
  <title>Pix2pi Forbidden</title>
  <style>
    :root { --bg:#f6f8fb; --text:#172033; --muted:#64748b; --border:#e5e7eb; --shadow:0 16px 42px rgba(15,23,42,.08); --radius:24px; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at top left,rgba(245,158,11,.18),transparent 34rem),var(--bg); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; padding:18px 16px; display:grid; place-items:center; }
    .shell { width:min(100%,860px); display:grid; gap:16px; }
    .card { background:rgba(255,255,255,.95); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:28px; }
    .badge { display:inline-flex; width:fit-content; border-radius:999px; padding:7px 11px; background:#fffbeb; color:#b45309; font-weight:900; font-size:12px; }
    h1 { margin:12px 0 10px; font-size:clamp(36px,7vw,70px); line-height:.95; letter-spacing:-.07em; }
    p { color:var(--muted); line-height:1.6; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    button,a { border:0; border-radius:16px; padding:12px 16px; background:#172033; color:#fff; font-weight:900; text-decoration:none; cursor:pointer; }
    a.secondary { background:#eef2ff; color:#1d4ed8; }
    code { background:#f1f5f9; border-radius:10px; padding:2px 6px; }
  </style>
</head>
<body>
  <!-- PIX2PI_317_8_FORBIDDEN_SCREEN_START -->
  <main class="shell" data-step="317.8" data-screen="forbidden">
    <section class="card">
      <span class="badge">403 / Forbidden</span>
      <h1 data-i18n="access_denial.forbidden.title">Yetki yok</h1>
      <p data-i18n="access_denial.forbidden.message">Bu sayfa veya işlem için yetkiniz yok. Doğru işletme ya da rol ile devam edin.</p>
      <p>Correlation ID: <code id="access-denial-correlation-id">access-correlation-missing</code></p>
      <p>Route: <code id="access-denial-route">/</code></p>
      <div class="actions">
        <button type="button" onclick="Pix2piAccessDenial.goToTenantSelection()">Tenant seçimine git</button>
        <a class="secondary" href="/dashboard/">Dashboard’a dön</a>
      </div>
    </section>
  </main>
  <!-- PIX2PI_317_8_FORBIDDEN_SCREEN_END -->
  <script src="/assets/access-denial/access-denial-runtime.js"></script>
  <script>Pix2piAccessDenial.setAccessDenialScreen("forbidden");</script>
</body>
</html>
