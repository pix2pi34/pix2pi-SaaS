<!doctype html>
<html lang="tr-TR" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="description" content="Pix2pi tenant selection screen" />
  <meta property="og:title" content="Pix2pi Tenant Selection" />
  <meta property="og:description" content="JWT login sonrası gerçek tenant seçimi." />
  <meta property="og:type" content="website" />
  <title>Pix2pi Tenant Selection</title>
  <style>
    :root { --bg:#f6f8fb; --text:#172033; --muted:#64748b; --border:#e5e7eb; --shadow:0 16px 42px rgba(15,23,42,.08); --radius:24px; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at top left,rgba(37,99,235,.15),transparent 34rem),var(--bg); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; padding:18px 16px; }
    .shell { width:min(100%,1120px); margin:0 auto; display:grid; gap:16px; }
    .hero,.card { background:rgba(255,255,255,.94); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; }
    h1 { margin:0 0 8px; font-size:clamp(34px,7vw,64px); line-height:.95; letter-spacing:-.07em; }
    h2 { margin:0 0 12px; font-size:19px; letter-spacing:-.03em; }
    p { margin:0; color:var(--muted); line-height:1.55; }
    .badge { display:inline-flex; width:fit-content; border-radius:999px; padding:7px 11px; background:#eff6ff; color:#1d4ed8; font-weight:900; font-size:12px; }
    .tenant-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
    .tenant-card { border:1px solid var(--border); border-radius:20px; padding:18px; background:#fff; display:grid; gap:8px; text-align:left; cursor:pointer; color:var(--text); font:inherit; box-shadow:0 10px 24px rgba(15,23,42,.05); }
    .tenant-card:hover { transform:translateY(-1px); }
    .tenant-card span,.tenant-card small { color:var(--muted); }
    .status { border:1px dashed #93c5fd; background:#eff6ff; }
    @media (max-width:900px) { .tenant-grid { grid-template-columns:1fr; } .hero,.card { border-radius:20px; } }
  </style>
</head>
<body>
  <!-- PIX2PI_317_3_TENANT_SELECTION_SCREEN_START -->
  <main class="shell" data-step="317.3" data-surface="tenant-selection">
    <section class="hero">
      <span class="badge">FAZ 7-R / 317.3</span>
      <h1 data-i18n="tenant_selection.title">Tenant seçimi</h1>
      <p data-i18n="tenant_selection.description">JWT login sonrası erişilebilir tenant listesi API cevabından yüklenir.</p>
    </section>

    <!-- PIX2PI_317_3_ACCESS_TOKEN_REQUIRED_START -->
    <section class="card status">
      <h2>Access token</h2>
      <p id="tenant-selection-status">Access token kontrol ediliyor.</p>
    </section>
    <!-- PIX2PI_317_3_ACCESS_TOKEN_REQUIRED_END -->

    <!-- PIX2PI_317_3_TENANT_LIST_API_RESULT_START -->
    <section class="card">
      <h2>Tenant listesi</h2>
      <div id="tenant-selection-list" class="tenant-grid" aria-live="polite"></div>
    </section>
    <!-- PIX2PI_317_3_TENANT_LIST_API_RESULT_END -->

    <!-- PIX2PI_317_3_TENANT_SELECTION_API_CONTRACT_START -->
    <section class="card">
      <h2>API contract</h2>
      <p>GET /api/auth/tenants ve POST /api/auth/tenant/select endpointleri Bearer access token ile çalışır.</p>
    </section>
    <!-- PIX2PI_317_3_TENANT_SELECTION_API_CONTRACT_END -->
  </main>
  <!-- PIX2PI_317_3_TENANT_SELECTION_SCREEN_END -->

  <script src="/assets/tenant-selection/tenant-selection-runtime.js"></script>
  <script>
    Pix2piTenantSelection.bootTenantSelectionScreen();
  </script>
</body>
</html>
