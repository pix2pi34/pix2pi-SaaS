server {
    listen 80;
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/pix2pi.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pix2pi.com.tr/privkey.pem;
    server_name phoenix.pix2pi.com.tr;

    auth_basic "Pix2pi Phoenix Owner";
    auth_basic_user_file /etc/nginx/.pix2pi_owner_register_approvals.htpasswd;

    root /root/pix2pi/pix2pi-SaaS/pix2pi_www/phoenix;
    index index.html;

    add_header X-Pix2pi-Canonical "PIX2PI_CLEAN_CANONICAL_PHOENIX" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = / {
        add_header X-Pix2pi-Route "PHOENIX_ROOT_REDIRECT" always;
        return 302 /owner-panel/register-approvals/;
    }

    location = /owner-panel/register-approvals {
        return 301 /owner-panel/register-approvals/;
    }

    location ^~ /owner-panel/register-approvals/api/ {
        add_header X-Pix2pi-Route "PHOENIX_OWNER_API" always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_pass http://127.0.0.1:9037/;
    }

    location ^~ /owner-panel/register-approvals/assets/ {
        add_header X-Pix2pi-Route "PHOENIX_OWNER_ASSETS" always;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location ^~ /owner-panel/register-approvals/ {
        add_header X-Pix2pi-Route "PHOENIX_OWNER_UI" always;
        try_files $uri $uri/ /owner-panel/register-approvals/index.html;
    }

    location / {
        return 404;
    }
}
# PIX2PI_CLEAN_CANONICAL_NGINX_END
