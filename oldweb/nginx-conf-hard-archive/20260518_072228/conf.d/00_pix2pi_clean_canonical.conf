server {
    listen 80;
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/pix2pi.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pix2pi.com.tr/privkey.pem;
    server_name pix2pi.com.tr www.pix2pi.com.tr;

    root /root/pix2pi/pix2pi-SaaS/pix2pi_www/public;
    index pix2pi_home.html;

    add_header X-Pix2pi-Canonical "PIX2PI_CLEAN_CANONICAL_PUBLIC" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = / {
        add_header X-Pix2pi-Route "PUBLIC_HOME_ROOT" always;
        try_files /pix2pi_home.html =404;
    }

    location = /pix2pi_home.html {
        add_header X-Pix2pi-Route "PUBLIC_HOME_FILE" always;
        try_files /pix2pi_home.html =404;
    }

    location = /assets {
        return 301 /assets/;
    }

    location ^~ /assets/ {
        add_header X-Pix2pi-Route "PUBLIC_ASSETS" always;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location / {
        return 404;
    }
}

