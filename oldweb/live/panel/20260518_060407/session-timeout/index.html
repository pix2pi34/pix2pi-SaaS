<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pix2pi Session Timeout</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f8fb;
      color: #172033;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .card {
      width: min(100%, 560px);
      background: #fff;
      border: 1px solid #e6e9f0;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 14px 34px rgba(18, 27, 46, 0.08);
    }

    a { color: #1f6feb; font-weight: 800; }
  </style>
</head>
<body>
  <!-- PIX2PI_317_SESSION_TIMEOUT_BEHAVIOR_START -->
  <main class="card" data-session-timeout-ms="1800000">
    <h1>Oturum süresi doldu</h1>
    <p>Güvenlik nedeniyle oturum kapatıldı. Lütfen tekrar giriş yap.</p>
    <a href="/login/">Tekrar giriş yap</a>
  </main>
  <!-- PIX2PI_317_SESSION_TIMEOUT_BEHAVIOR_END -->
</body>
</html>
