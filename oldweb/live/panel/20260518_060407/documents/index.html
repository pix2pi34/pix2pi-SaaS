<!doctype html>
<html lang="tr-TR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pix2pi Fatura / Belge Ekranı</title>
  <style>
    body{margin:0;background:#07090d;color:#f8fafc;font-family:system-ui}
    .wrap{max-width:1080px;margin:auto;padding:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{border:1px solid rgba(255,214,10,.28);background:rgba(255,255,255,.06);border-radius:22px;padding:22px}
    code{color:#ffd60a}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Fatura / belge ekranı</h1>
      <p>Satıştan belge oluşturma, belge listesi, detay, PDF/UBL placeholder, durum, retry ve iptal görünümü.</p>
      <code>PIX2PI_326_DOCUMENT_SCREEN_START</code>
    </section>
    <section class="grid">
      <div class="card">Belge listesi</div>
      <div class="card">Satıştan belge oluşturma</div>
      <div class="card">PDF / UBL placeholder</div>
      <div class="card">Durum takibi</div>
      <div class="card">İptal / retry görünümü</div>
      <div class="card">Tenant-safe belge testleri</div>
    </section>
  </main>
</body>
</html>
