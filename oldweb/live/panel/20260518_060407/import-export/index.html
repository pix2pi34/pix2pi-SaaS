<!doctype html>
<html lang="tr-TR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pix2pi Import / Export</title>
  <style>
    body{margin:0;background:#07090d;color:#f8fafc;font-family:system-ui}
    .wrap{max-width:1080px;margin:auto;padding:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{border:1px solid rgba(255,214,10,.28);background:rgba(255,255,255,.06);border-radius:22px;padding:22px}
    code{color:#ffd60a}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Import / Export</h1>
      <p>Cari import, ürün import, stok import, satış/belge export, CSV/XLSX placeholder ve tenant-safe testler.</p>
      <code>PIX2PI_328_IMPORT_EXPORT_SCREEN_START</code>
    </section>
    <section class="grid">
      <div class="card">Cari import</div>
      <div class="card">Ürün import</div>
      <div class="card">Stok import</div>
      <div class="card">Satış / belge export</div>
      <div class="card">CSV / XLSX placeholder</div>
      <div class="card">Tenant-safe import/export</div>
    </section>
  </main>
</body>
</html>
