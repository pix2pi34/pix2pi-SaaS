<!doctype html>
<html lang="tr-TR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pix2pi Rapor Ekranları</title>
  <style>
    body{margin:0;background:#07090d;color:#f8fafc;font-family:system-ui}
    .wrap{max-width:1120px;margin:auto;padding:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{border:1px solid rgba(255,214,10,.28);background:rgba(255,255,255,.06);border-radius:22px;padding:22px}
    code{color:#ffd60a}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Rapor ekranları</h1>
      <p>Günlük satış, ürün satış, stok, cari bakiye, KDV, marketplace ve abonelik/kullanım raporları.</p>
      <code>PIX2PI_327_REPORTS_SCREEN_START</code>
    </section>
    <section class="grid">
      <div class="card">Günlük satış raporu</div>
      <div class="card">Ürün satış raporu</div>
      <div class="card">Stok raporu</div>
      <div class="card">Cari bakiye raporu</div>
      <div class="card">KDV raporu</div>
      <div class="card">Marketplace raporu</div>
      <div class="card">Abonelik / kullanım raporu</div>
    </section>
  </main>
</body>
</html>
