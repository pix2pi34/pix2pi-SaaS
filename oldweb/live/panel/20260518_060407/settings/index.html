<!doctype html>
<html lang="tr-TR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pix2pi İşletme Ayarları</title>
  <style>
    body{margin:0;background:#07090d;color:#f8fafc;font-family:system-ui}
    .wrap{max-width:1040px;margin:auto;padding:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{border:1px solid rgba(255,214,10,.28);background:rgba(255,255,255,.06);border-radius:22px;padding:22px}
    code{color:#ffd60a}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>İşletme ayarları</h1>
      <p>İşletme adı, vergi bilgisi, adres, varsayılan dil, para birimi, şube ve kasa görünümü.</p>
      <code>PIX2PI_322_BUSINESS_SETTINGS_SCREEN_START</code>
    </section>
    <section class="grid">
      <div class="card">İşletme adı</div>
      <div class="card">Vergi bilgisi</div>
      <div class="card">Adres</div>
      <div class="card">Varsayılan dil</div>
      <div class="card">Para birimi</div>
      <div class="card">Şube / kasa</div>
    </section>
  </main>
</body>
</html>
