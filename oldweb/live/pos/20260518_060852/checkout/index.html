<!doctype html>
<html lang="tr-TR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pix2pi POS Sepet / Ödeme</title>
  <style>
    body{margin:0;background:#07090d;color:#f8fafc;font-family:system-ui}
    .wrap{max-width:1120px;margin:auto;padding:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{border:1px solid rgba(255,214,10,.28);background:rgba(255,255,255,.06);border-radius:22px;padding:22px}
    code{color:#ffd60a}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>POS sepet / ödeme akışı</h1>
      <p>Cart create, item add, summary, payment start, payment paid/failed, tenant-safe guard ve rollback kontrolü.</p>
      <code>PIX2PI_332_POS_CHECKOUT_PAYMENT_SCREEN_START</code>
    </section>
    <section class="grid">
      <div class="card">Sepet oluşturma</div>
      <div class="card">Ürün ekleme</div>
      <div class="card">Sepet özeti</div>
      <div class="card">Ödeme başlatma</div>
      <div class="card">Paid / failed</div>
      <div class="card">Audit evidence</div>
    </section>
  </main>
</body>
</html>
