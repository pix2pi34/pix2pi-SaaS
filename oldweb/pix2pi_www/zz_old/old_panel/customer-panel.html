<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pix2pi Müşteri Paneli</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}
    main{min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{max-width:520px;width:100%;background:white;border:1px solid #e2e8f0;border-radius:22px;padding:22px;box-shadow:0 20px 60px rgba(15,23,42,.08)}
    h1{font-size:26px;margin:0 0 8px;letter-spacing:-.04em}
    p{font-size:14px;line-height:1.5;color:#475569}
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Giriş başarılı</h1>
      <p>Müşteri paneli ana ekranı burada açılacak. Rol bazlı yönlendirme sonraki adımda bağlanacak.</p>
    </section>
  </main>
  <!-- PIX2PI_CUSTOMER_PANEL_PLACEHOLDER_MARKER -->
</body>
</html>
