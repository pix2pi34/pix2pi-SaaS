# PIX2PI_PANEL_PUBLIC_ROUTE_FIX_START

server {
    listen 80;
    server_name panel.pix2pi.com.tr;

    root /var/www/pix2pi/panel;
    index index.html;

    add_header X-Pix2pi-Surface panel always;
    add_header X-Pix2pi-Public-Route fixed-panel-http always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok","surface":"panel","service":"pix2pi-panel","phase":"7-R","route":"public-http","domain":"panel.pix2pi.com.tr"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name panel.pix2pi.com.tr;

    ssl_certificate /etc/letsencrypt/live/pix2pi.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pix2pi.com.tr/privkey.pem;

    root /var/www/pix2pi/panel;
    index index.html;

    add_header X-Pix2pi-Surface panel always;
    add_header X-Pix2pi-Public-Route fixed-panel-https always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok","surface":"panel","service":"pix2pi-panel","phase":"7-R","route":"public-https","domain":"panel.pix2pi.com.tr"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# PIX2PI_PANEL_PUBLIC_ROUTE_FIX_END
