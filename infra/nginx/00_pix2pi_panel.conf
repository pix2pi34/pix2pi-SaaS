# PIX2PI_PANEL_CANONICAL_ROUTE_START
# FAZ_7R_341_FIX_V2_PANEL_NGINX_TARGET
# Canonical active route target: /etc/nginx/conf.d/00_pix2pi_panel.conf

server {
    listen 80;
    server_name panel.pix2pi.com.tr;

    root /var/www/pix2pi/panel;
    index index.html;

    add_header X-Pix2pi-Surface merchant-panel always;
    add_header X-Pix2pi-Step 341 always;
    add_header X-Pix2pi-Fix v2-panel-nginx-target always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        try_files /health.json =404;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# PIX2PI_PANEL_CANONICAL_ROUTE_END
