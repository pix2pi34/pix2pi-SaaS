# PIX2PI_329_POS_NGINX_ROUTE_START

server {
    listen 80;
    server_name pos.pix2pi.com.tr;

    root /var/www/pix2pi/pos;
    index index.html;

    add_header X-Pix2pi-Surface pos always;
    add_header X-Pix2pi-Step 329 always;
    add_header X-Pix2pi-Fix v2-route-body-marker always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok","surface":"pos","service":"pix2pi-pos","phase":"FAZ 7-R","step":"329","fix":"v2-route-body-marker","ready_for_step_330":true}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name pos.pix2pi.com.tr;

    ssl_certificate /etc/letsencrypt/live/pix2pi.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pix2pi.com.tr/privkey.pem;

    root /var/www/pix2pi/pos;
    index index.html;

    add_header X-Pix2pi-Surface pos always;
    add_header X-Pix2pi-Step 329 always;
    add_header X-Pix2pi-Fix v2-route-body-marker always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok","surface":"pos","service":"pix2pi-pos","phase":"FAZ 7-R","step":"329","fix":"v2-route-body-marker","ready_for_step_330":true}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# PIX2PI_329_POS_NGINX_ROUTE_END
