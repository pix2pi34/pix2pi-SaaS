server {
    listen 80;
    server_name panel.pix2pi.com.tr;

    root /var/www/pix2pi/panel;
    index index.html;

    add_header X-Pix2pi-Surface panel always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok","surface":"panel","service":"pix2pi-panel","phase":"7-R","step":"316","domain":"panel.pix2pi.com.tr"}';
    }

    location = /health.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        try_files /health.json =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
