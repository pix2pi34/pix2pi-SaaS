<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pix2pi Mission Control</title>

<style>
body{
background:#0b0f14;
color:#00ff9c;
font-family:monospace;
padding:40px;
}

h1{
font-size:30px;
}

.panel{
border:1px solid #00ff9c;
padding:20px;
margin-top:20px;
width:420px;
}

.status{
margin-top:10px;
font-size:18px;
}
</style>

</head>

<body>

<h1>🚀 Pix2pi Mission Control</h1>

<div class="panel">
<h3>Mission Control Status</h3>
<div id="status" class="status">checking...</div>
</div>

<script>

async function check(){

let r = await fetch("/health")
let j = await r.json()

document.getElementById("status").innerHTML =
"Control Panel : " + j.status +
"<br>Mission Control : " + j.mission_control

}

check()

</script>

</body>
</html>
